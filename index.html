<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak | Premium Gift 🌙</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Eid Mubarak | Aapke liye aik Surprise! 🎁">
<meta property="og:description" content="Zindagi mein kuch log bohat khaas hote hain... click karke apna gift check karein! ✨">
<meta property="og:image" content="https://images.unsplash.com/photo-1512101176959-c557f3516787?q=80&w=1000&auto=format&fit=crop">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
/* CSS Reset & Professional UI */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    overflow: hidden; font-family: 'Poppins', sans-serif; 
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1564121211835-e88c852648ab?q=80&w=2070&auto=format&fit=crop');
    background-size: cover; background-position: center;
    color: white; display: flex; justify-content: center; align-items: center; height: 100vh;
}

/* 3D Card Container */
.card-container {
    perspective: 1000px;
    display: none; 
    width: 320px;
    height: 400px;
    margin-top: 20px;
}

.card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.8s;
    transform-style: preserve-3d;
    cursor: pointer;
}

.card-inner.is-flipped { transform: rotateY(180deg); }

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    border: 2px solid rgba(255, 215, 0, 0.3);
}

.card-front {
    background: linear-gradient(135deg, #2c1a4d, #1a0f2e);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card-back {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    transform: rotateY(180deg);
}

/* Buttons */
.btn-whatsapp {
    background: #25D366;
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    display: inline-flex;
    align-items: center;
    margin-top: 20px;
    font-size: 14px;
    transition: 0.3s;
}
.btn-whatsapp:hover { background: #128C7E; transform: scale(1.05); }

#setup-ui, #typing-ui, #game-ui { width: 90%; max-width: 400px; padding: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
button { padding: 12px 30px; border-radius: 50px; border: none; background: #ffd700; font-weight: bold; cursor: pointer; margin-top: 15px; }
input { width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:10px; text-align:center; outline:none; }
.heart { position: absolute; font-size: 35px; cursor: pointer; z-index: 100; touch-action: none; }
</style>
</head>
<body>

<audio id="sound-pop" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<div id="setup-ui">
    <h2 style="color:#ffd700; margin-bottom:15px;">🌙 EID GIFT</h2>
    <input type="text" id="name" placeholder="Apna Naam Likhein...">
    <button onclick="startApp()">Unlock Surprise ✨</button>
</div>

<div id="typing-ui" style="display:none;">
    <div id="typing" style="font-style:italic; line-height:1.6;"></div>
</div>

<div id="game-ui" style="display:none;">
    <h3 style="color:#ffd700;">Catch 10 Hearts! ❤️</h3>
    <p style="font-size:24px;">Score: <span id="score">0</span> / 10</p>
</div>

<div class="card-container" id="final-card">
    <div class="card-inner" onclick="this.classList.toggle('is-flipped')">
        <div class="card-front">
            <h1 style="font-size: 50px;">🎁</h1>
            <p style="margin-top:15px; font-weight:bold;">Tap to Open Your Card</p>
            <small>(Aapke liye aik message hai)</small>
        </div>
        <div class="card-back">
            <div id="final-msg" style="font-size:16px; line-height:1.5;"></div>
            <a href="#" id="whatsapp-btn" class="btn-whatsapp" target="_blank">Share with Me 📱</a>
        </div>
    </div>
</div>

<script>
let score = 0, storedName = "";
// Updated Bonding Lines
let text = "Zindagi mein bohat se log milte hain, par har kisi ke sath 'ACHI BONDING' nahi banti. ✨ Agar ye aap tak aaya hai, toh aap un chand logon mein se ho jin ke sath meri bonding level 100/100 hai! ❤️ Chalo ab game khel kar dikhao, dekhte hain kitne hearts catch karte ho! 😉";

function startApp() {
    let name = document.getElementById('name').value.trim();
    if(!name) return alert("Naam tou likh do! 😂");
    storedName = name;
    document.getElementById('setup-ui').style.display = 'none';
    document.getElementById('typing-ui').style.display = 'block';
    
    let i=0;
    function type() {
        if(i < text.length) {
            document.getElementById('typing').innerHTML += text[i];
            i++;
            setTimeout(type, 50);
        } else {
            setTimeout(() => {
                document.getElementById('typing-ui').style.display = 'none';
                startGame();
            }, 1500);
        }
    }
    type();
}

function startGame() {
    document.getElementById('game-ui').style.display = 'block';
    let gameInterval = setInterval(() => {
        const h = document.createElement('div');
        h.className = 'heart'; h.innerHTML = '💖';
        h.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        h.style.top = '-50px';
        document.body.appendChild(h);

        let fall = setInterval(() => {
            h.style.top = (h.offsetTop + 5) + 'px';
            if(h.offsetTop > window.innerHeight) { h.remove(); clearInterval(fall); }
        }, 30);

        h.onpointerdown = (e) => {
            e.preventDefault();
            score++;
            document.getElementById('score').innerText = score;
            document.getElementById('sound-pop').play().catch(()=>{});
            h.remove(); clearInterval(fall);
            if(score >= 10) { clearInterval(gameInterval); showFinal(); }
        };
    }, 800);
}

function showFinal() {
    document.getElementById('sound-win').play().catch(()=>{});
    document.getElementById('game-ui').style.display = 'none';
    document.getElementById('final-card').style.display = 'block';
    
    let name = storedName.toLowerCase().replace(/[^a-z]/g,"");
    let msg = "";

    if(name.includes("khadija")) {
        msg = "💖 **Eid Mubarak Khadija!** 💖<br><br>Squad ki 'Head of Drama' ko Eid Mubarak! 📸 Outfit check ho gaya? Umeed hai aaj ke 500 photoshoots mein se kam az kam 2-3 pics tou achi ayi hongi? 😂 Stay iconic 💅✨ Or teacher, website sahi banai hai na? 😉";
    } else if(name.includes("khizer") || name.includes("khizar")) {
        msg = "💥 **Eid Mubarak Khizer!** 💥<br><br>2 number hafiz! 😂 Dalali choro aur bhai ke liye bhi kuch dhoondo! 🔥";
    } else if(name.includes("murtaza")) {
        msg = "🔥 **Eid Mubarak Murtaza!** 🔥<br><br>Jutt Sahab! Heavy vibes hamesha ki tarah! Humari Eid ke maukay par aapko bhi Eid Mubarak! 💯";
    } else {
        msg = "🌙 **Eid Mubarak!** 💖<br><br>Khushiyan aur hasi ke saath ye din enjoy karo. Khana zyada khao, selfies lo aur full vibes mein raho 😄💖😊";
    }
    
    document.getElementById('final-msg').innerHTML = msg;

    let waMessage = `Oye! Maine tumhari Eid Game kheli aur mera score ${score}/10 raha! ✨ Eid Mubarak! ❤️`;
    let myNumber = "923214087156"; 
    document.getElementById('whatsapp-btn').href = `https://wa.me/${myNumber}?text=${encodeURIComponent(waMessage)}`;
}

// Tab attention grabber
window.onblur = () => { document.title = "Wapas Aao! 🌙"; }
window.onfocus = () => { document.title = "Eid Mubarak | Premium Gift 🌙"; }
</script>
</body>
</html>
